name: Print client payload

on:
  workflow_dispatch:
    # Permite ejecución manual desde la interfaz de GitHub
  repository_dispatch:
    types: [build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        run: |
          # Usamos un valor por defecto para evitar errores si el payload no existe
          echo "The version is ${{ github.event.client_payload.version || 'manual-run' }}"

      - name: Check out specific ref
        uses: actions/checkout@v4 # Actualizado a v4 (más estable y reciente)
        with:
          # Si no hay ref en el payload, usa la rama por defecto
          ref: ${{ github.event.client_payload.ref || github.ref }}
    
      - name: Volcar todo el client_payload
        run: echo '${{ toJson(github.event.client_payload) }}'

      - name: Leer payload con Script
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload;
            console.log("Contenido completo:", JSON.stringify(payload, null, 2));
        
            // Ejemplo de acceso a una propiedad específica
            if (payload && payload.version) {
              core.info(`Trabajando con la versión: ${payload.version}`);
            }


  token-example:
    runs-on: ubuntu-latest
    permissions:
      issues: read # Permiso necesario para listar issues
    steps:
      - name: Ejemplo usando el token via API
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               "https://github.com/${{ github.repository }}/issues"

      - name: Disparar repositorio destino
        run: |
          curl -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://github.com/${{ github.repository }} \
              -d '{"event_type": "build", "client_payload": {"version": "v2", "ref": "develop"}}'
