name: NodeJS Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.JFROG_URL }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  SUBMISSION_REPO: ${{ vars.JFROG_SUBMISSION_REPO }}
  PROD_REPO: ${{ vars.JFROG_PROD_REPO }}
  IMAGE_TAG: ${{ github.sha }}

###########################################################
# PLAN / CODE STAGE
###########################################################
jobs:

  lint:
    name: Code Quality (Lint)
    #runs-on: [self-hosted, linux, build-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # - name: Install dependencies
      #   run: npm ci

      # - name: Run lint
      #   run: npm run lint


###########################################################
# BUILD + TEST (Docker CI Image)
###########################################################

  build-test:
    name: Build and Test (CI Image)
    # runs-on: [self-hosted, linux, docker-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    needs: lint

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Setup Buildx es vital para que el sistema reconozca la caché de GitHub (GHA)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3        

      - name: Docker Login JFrog
        run: |
          echo "${JFROG_PASSWORD}" | docker login ${REGISTRY} \
          -u "${JFROG_USER}" --password-stdin
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      # - name: Build CI Docker Image
      #   run: |
      #     docker build \
      #       -f Dockerfile \
      #       -t ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:ci-${IMAGE_TAG} .

      # --- PASO 1: BUILD CI (Artifact 1) ---
      # Aquí se descarga la imagen de 1GB por PRIMERA VEZ o se trae de la caché GHA
      - name: Build CI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ci-stage # Si usas multi-stage
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- PASO 2: BUILD CD (Artifact 2) ---
      # Docker detectará que la base es la misma y NO descargará el giga otra vez
      - name: Build CD Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cd-stage
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cd-${{ github.sha }}
          load: true
          cache-from: type=gha

      # # --- PASO 3: SCAN CON WIZ ---
      # # Escaneamos la imagen de CD antes de generar el artefacto final
      # - name: Wiz Scan
      #   run: |
      #     curl -o wizcli https://wizcli.s3.amazonaws.com/wizcli && chmod +x wizcli
      #     ./wizcli auth --id "${{ secrets.WIZ_CLIENT_ID }}" --secret "${{ secrets.WIZ_CLIENT_SECRET }}"
      #     ./wizcli docker scan --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cd-${{ github.sha }}

      # --- PASO 4: BUILD FINAL (Artifact 3) ---
      # Solo si el scan pasó. Se reutiliza todo lo anterior.
      - name: Build Final Image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.REGISTRY }}/${{ env.SUBMISSION_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          push: true # Este ya se sube al registro oficial
          cache-from: type=gha

###########################################################
# PACKAGE FINAL IMAGE
###########################################################

  package:
    name: Build Final Production Image
    #runs-on: [self-hosted, linux, docker-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    needs: build-test

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        run: |
          echo "${JFROG_PASSWORD}" | docker login ${REGISTRY} \
          -u "${JFROG_USER}" --password-stdin
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      - name: Build Final Docker Image
        run: |
          docker build \
            -f Dockerfile \
            -t ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG} .

      # - name: Push to submission repository
      #   run: |
      #     docker push \
      #     ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG}


###########################################################
# SONAR SCAN (NON BLOCKING)
###########################################################

  sonar:
    name: SonarQube Scan
    #runs-on: [self-hosted, linux, build-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    needs: package
    continue-on-error: true

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Sonar Scanner
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=${IMAGE_NAME} \
            -Dsonar.sources=src \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


###########################################################
# WIZ SECURITY SCAN
###########################################################

  wiz-scan:
    name: Wiz Container Scan
    #runs-on: [self-hosted, linux, security-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    needs: package

    steps:

      - name: Authenticate Wiz
        run: |
          wizcli auth \
            --id ${WIZ_CLIENT_ID} \
            --secret ${WIZ_CLIENT_SECRET}
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Scan container image
        run: |
          wizcli image scan \
            ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG} \
            --output wiz-scan.json

      - name: Download full security report
        run: |
          wizcli image report \
            ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG} \
            --format json \
            --output wiz-report.json

      - name: Upload Wiz Scan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiz-security-report
          path: |
            wiz-scan.json
            wiz-report.json


###########################################################
# PROMOTE IMAGE TO PRODUCTION REPOSITORY
###########################################################

  promote:
    name: Promote Image to Production
    #runs-on: [self-hosted, linux, docker-runner]
    #runs-on: [ubuntu-latest, mmc-ubuntu]
    runs-on: ubuntu-latest
    needs: wiz-scan

    steps:

      - name: Docker Login
        run: |
          echo "${JFROG_PASSWORD}" | docker login ${REGISTRY} \
          -u "${JFROG_USER}" --password-stdin
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      - name: Pull submission image
        run: |
          docker pull \
          ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Tag production image
        run: |
          docker tag \
          ${REGISTRY}/${SUBMISSION_REPO}/${IMAGE_NAME}:${IMAGE_TAG} \
          ${REGISTRY}/${PROD_REPO}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Push production image
        run: |
          docker push \
          ${REGISTRY}/${PROD_REPO}/${IMAGE_NAME}:${IMAGE_TAG}


###########################################################
# DEPLOY TO KUBERNETES USING HELM
###########################################################

  deploy:
    name: Deploy to Kubernetes
    #runs-on: [self-hosted, linux, k8s-runner]
    runs-on: [ubuntu-latest, mmc-ubuntu]
    needs: promote
    environment: production

    steps:

      - name: Checkout Helm chart
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          echo "${KUBE_CONFIG}" > kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${IMAGE_NAME} ./helm \
            --namespace ${K8S_NAMESPACE} \
            --create-namespace \
            --set image.repository=${REGISTRY}/${PROD_REPO}/${IMAGE_NAME} \
            --set image.tag=${IMAGE_TAG} \
            --kubeconfig kubeconfig


###########################################################
# POST DEPLOY INFO
###########################################################

  monitor:
    name: Deployment Info
    #runs-on: [self-hosted, linux, k8s-runner]
    runs-on: [ubuntu-latest, mmc-ubuntu]
    needs: deploy

    steps:

      - name: Print deployment info
        run: |
          echo "Deployment completed"
          echo "Image:"
          echo "${REGISTRY}/${PROD_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
